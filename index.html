<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RoomLink — Student Accommodation Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://js.paystack.co/v1/inline.js"></script>
<style>
  :root{
    --lemon-a:#F4E836;
    --lemon-b:#BFE01A;
    --lemon-grad: linear-gradient(135deg, var(--lemon-a), var(--lemon-b));
    --ink:#14171A;
    --muted:#6B7280;
    --line:#E9EAEC;
    --card:#F7F8F5;
    --bg:#FFFFFF;
    --white:#FFFFFF;
    --danger:#D64545;
    --shadow: 0 10px 30px rgba(20,23,26,0.08);
    --radius:16px;
    --glass-bg: rgba(255,255,255,0.55);
    --glass-border: rgba(255,255,255,0.6);
  }
  [data-theme="dark"]{
    --ink:#F5F6F2;
    --muted:#9AA0A6;
    --line:#2A2C30;
    --card:#1B1C1F;
    --bg:#101114;
    --white:#1B1C1F;
    --shadow: 0 10px 30px rgba(0,0,0,0.45);
    --glass-bg: rgba(30,32,36,0.55);
    --glass-border: rgba(255,255,255,0.08);
  }
  .glass{
    background: var(--glass-bg);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    border: 1px solid var(--glass-border);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    transition:background .3s ease, color .3s ease;
  }
  h1,h2,h3,.display{
    font-family:'Sora',sans-serif;
    font-weight:800;
    letter-spacing:-0.02em;
    margin:0;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;}
  input,textarea,select{font-family:inherit;}
  a{color:inherit;text-decoration:none;}
  ::selection{background:var(--lemon-b);color:var(--ink);}

  .app{max-width:1100px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
  .fade-in{animation:fadeIn .4s ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  header.topbar{
    display:flex;flex-direction:column;gap:12px;
    padding:14px 20px;position:sticky;top:0;z-index:30;
    background:var(--glass-bg);
    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);
    border-bottom:1px solid var(--glass-border);
  }
  .topbar-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:nowrap;}
  .brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .brand-mark{
    width:36px;height:36px;border-radius:11px;
    background:var(--lemon-grad);display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .brand-mark svg{width:18px;height:18px;color:var(--ink);}
  .brand-name{font-size:19px;font-weight:800;}

  nav.tabs{display:flex;gap:3px;background:var(--card);padding:4px;border-radius:12px;overflow-x:auto;}
  nav.tabs button{
    padding:9px 14px;border-radius:9px;color:var(--muted);
    font-size:12.5px;font-weight:700;transition:all .18s ease;white-space:nowrap;
  }
  nav.tabs button.active{background:var(--lemon-grad);color:var(--ink);}

  .top-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .icon-btn{
    width:38px;height:38px;border-radius:50%;background:var(--card);
    display:flex;align-items:center;justify-content:center;color:var(--ink);
    transition:transform .15s ease;
  }
  .icon-btn:hover{transform:scale(1.06);}
  .icon-btn svg{width:17px;height:17px;}
  .account-chip{display:flex;align-items:center;gap:8px;padding:5px 14px 5px 5px;border-radius:999px;background:var(--card);border:1px solid var(--line);transition:transform .15s ease;}
  .account-chip:hover{transform:scale(1.03);}
  .account-chip .chip-avatar{width:30px;height:30px;border-radius:50%;background:var(--lemon-grad);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12.5px;color:var(--ink);overflow:hidden;flex-shrink:0;}
  .account-chip .chip-avatar img{width:100%;height:100%;object-fit:cover;}
  .account-chip .chip-label{font-size:12.5px;font-weight:700;color:var(--ink);white-space:nowrap;max-width:96px;overflow:hidden;text-overflow:ellipsis;}
  .notif-btn{position:relative;}
  .notif-dot{position:absolute;top:6px;right:7px;width:9px;height:9px;border-radius:50%;background:var(--danger);border:2px solid var(--bg);}
  .notif-row{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);cursor:pointer;}
  .notif-row:last-child{border-bottom:none;}
  .notif-row .notif-icon{width:34px;height:34px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--ink);}
  .notif-row .notif-icon svg{width:15px;height:15px;}
  .notif-row.unread{background:color-mix(in srgb, var(--lemon-a) 12%, transparent);border-radius:12px;padding:12px;}
  .notif-row p{font-size:13px;line-height:1.4;margin:0;}
  .notif-row .notif-time{font-size:11px;color:var(--muted);margin-top:3px;}
  .comment-reply-btn{font-size:11.5px;font-weight:700;color:var(--muted);margin-top:4px;display:inline-flex;align-items:center;gap:4px;}
  .comment-thread{margin-left:42px;margin-top:10px;}
  .like-btn{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--muted);}
  .like-btn.liked{color:var(--danger);}
  .like-btn svg{width:16px;height:16px;}

  main{flex:1;padding:24px 20px 100px;}

  .hero{margin-bottom:22px;}
  .hero .eyebrow{font-size:11.5px;font-weight:800;letter-spacing:.1em;color:var(--ink);background:var(--lemon-grad);display:inline-block;padding:4px 10px;border-radius:99px;margin-bottom:10px;}
  .hero h1{font-size:30px;line-height:1.1;margin-bottom:8px;}
  .hero p{color:var(--muted);font-size:14.5px;max-width:540px;line-height:1.55;}

  .browse-layout{display:flex;gap:22px;align-items:flex-start;}
  .filters{width:230px;flex-shrink:0;border-radius:var(--radius);padding:18px;position:sticky;top:88px;}
  .filters h4{font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px;}
  .filter-group{margin-bottom:18px;}
  .filter-group label{display:block;font-size:12.5px;font-weight:700;margin-bottom:7px;}
  .filter-group select, .filter-group input[type=range]{width:100%;accent-color:var(--lemon-b);}
  .filter-group select{border:1.5px solid var(--line);border-radius:10px;padding:9px 11px;font-size:13px;background:var(--white);color:var(--ink);}
  .price-val{font-size:12.5px;color:var(--ink);font-weight:700;margin-top:4px;}
  .reset-link{font-size:12px;color:var(--muted);text-decoration:underline;}

  .results-col{flex:1;min-width:0;}
  .results-count{font-size:13px;color:var(--muted);margin-bottom:14px;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;}
  .listing-card{
    background:var(--white);border-radius:18px;overflow:hidden;border:1px solid var(--line);
    cursor:pointer;transition:transform .18s ease, box-shadow .18s ease;
  }
  .listing-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);}
  .thumb{height:130px;display:flex;align-items:center;justify-content:center;position:relative;background:var(--card);}
  .thumb svg{width:32px;height:32px;opacity:.5;}
  .protected-badge{
    position:absolute;top:10px;right:10px;background:var(--lemon-grad);color:var(--ink);
    font-size:10px;font-weight:800;letter-spacing:.02em;padding:5px 9px;border-radius:99px;
    display:flex;align-items:center;gap:4px;
  }
  .protected-badge svg{width:10px;height:10px;}
  .price-tag{position:absolute;bottom:10px;left:10px;background:rgba(20,23,26,0.85);color:#fff;font-size:13px;font-weight:700;padding:6px 11px;border-radius:10px;}
  .listing-body{padding:14px 15px 16px;}
  .listing-body h3{font-size:15px;font-weight:700;margin-bottom:5px;line-height:1.3;}
  .listing-body .meta{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-bottom:3px;}
  .roomtype-pill{display:inline-block;font-size:10.5px;font-weight:700;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:3px 9px;border-radius:99px;margin-top:8px;}

  .empty{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty svg{width:42px;height:42px;opacity:.35;margin-bottom:12px;}
  .empty h3{font-size:16px;color:var(--ink);margin-bottom:4px;}

  .form-wrap{max-width:560px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:13px;font-weight:700;margin-bottom:6px;}
  .field .hint{font-size:11.5px;color:var(--muted);margin-top:4px;}
  .field input, .field textarea, .field select{
    width:100%;border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;
    font-size:14px;color:var(--ink);background:var(--white);outline:none;transition:border-color .15s ease;
  }
  .field input:focus, .field textarea:focus, .field select:focus{border-color:var(--lemon-b);}
  .field textarea{resize:vertical;min-height:80px;}
  .field-row{display:flex;gap:12px;}
  .field-row .field{flex:1;}
  .checkbox-row{display:flex;align-items:flex-start;gap:10px;background:var(--card);border-radius:12px;padding:13px 14px;margin-bottom:16px;}
  .checkbox-row input{margin-top:2px;width:16px;height:16px;accent-color:var(--lemon-b);}
  .checkbox-row .txt strong{font-size:13.5px;display:block;margin-bottom:2px;}
  .checkbox-row .txt span{font-size:12px;color:var(--muted);}

  .btn-primary{
    background:var(--lemon-grad);color:var(--ink);padding:13px 22px;border-radius:12px;font-weight:800;font-size:14px;
    display:inline-flex;align-items:center;gap:8px;transition:transform .12s ease;
  }
  .btn-primary:hover{transform:translateY(-1px);}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;}
  .btn-secondary{background:var(--card);color:var(--ink);padding:13px 22px;border-radius:12px;font-weight:700;font-size:14px;border:1px solid var(--line);}
  .btn-full{width:100%;justify-content:center;}
  .btn-text{font-size:13px;font-weight:700;color:var(--ink);text-decoration:underline;}

  .category-pick{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px;}
  .category-pick button{padding:14px 8px;border-radius:13px;border:1.5px solid var(--line);background:var(--white);font-weight:700;font-size:12.5px;color:var(--muted);}
  .category-pick button.active{border-color:var(--lemon-b);color:var(--ink);background:var(--card);}

  .overlay{position:fixed;inset:0;background:rgba(20,23,26,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s ease;}
  .overlay.open{opacity:1;pointer-events:auto;}
  @media(min-width:640px){.overlay{align-items:center;}}
  .overlay.center-modal{align-items:center;}
  .overlay.center-modal .sheet{border-radius:22px;max-width:380px;transform:none;}
  .sheet{background:var(--glass-bg);backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);border:1px solid var(--glass-border);width:100%;max-width:540px;border-radius:22px 22px 0 0;padding:0 0 28px;max-height:90vh;overflow-y:auto;transform:translateY(30px);transition:transform .3s cubic-bezier(.2,.9,.3,1);}
  .overlay.open .sheet{transform:translateY(0);}
  @media(min-width:640px){.sheet{border-radius:22px;}}
  .sheet-thumb{height:150px;display:flex;align-items:center;justify-content:center;position:relative;border-radius:22px 22px 0 0;background:var(--card);}
  .sheet-thumb svg{width:42px;height:42px;opacity:.4;}
  .close-x{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);}
  .sheet-content{padding:20px 22px 0;}
  .sheet h2{font-size:20px;margin-bottom:6px;}
  .price-row{font-size:19px;font-weight:800;margin-bottom:14px;}
  .price-row span{font-size:12.5px;font-weight:500;color:var(--muted);}
  .detail-meta{display:flex;flex-wrap:wrap;gap:14px;margin:14px 0;padding:14px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
  .detail-meta div{font-size:12.5px;}
  .detail-meta .label{color:var(--muted);margin-bottom:2px;}
  .detail-meta .value{font-weight:700;}
  .desc-full{font-size:14px;line-height:1.6;}

  .landlord-box{background:var(--card);border-radius:14px;padding:16px;margin-top:16px;}
  .landlord-box .label{font-size:11.5px;color:var(--muted);margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
  .reveal-row{display:flex;align-items:center;gap:12px;}
  .reveal-row .lock-icon{width:38px;height:38px;border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .reveal-row .lock-icon svg{width:17px;height:17px;}
  .reveal-row p{font-size:12.5px;color:var(--muted);margin:0;line-height:1.4;}
  .landlord-revealed{display:flex;align-items:center;gap:12px;}
  .landlord-revealed .av{width:42px;height:42px;border-radius:50%;background:var(--lemon-grad);color:var(--ink);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0;}
  .landlord-revealed strong{display:block;font-size:14.5px;}
  .landlord-revealed span{font-size:12.5px;color:var(--muted);}

  .commission-note{margin-top:12px;background:var(--bg);border:1px dashed var(--line);border-radius:11px;padding:11px 13px;font-size:11.5px;color:var(--muted);display:flex;gap:8px;align-items:flex-start;}
  .commission-note svg{width:14px;height:14px;flex-shrink:0;margin-top:1px;}
  .sheet-actions{display:flex;gap:10px;margin-top:18px;}

  .explain-wrap{max-width:760px;}
  .flow-row{display:flex;align-items:stretch;gap:8px;margin:22px 0;flex-wrap:wrap;}
  .flow-card{flex:1;min-width:160px;background:var(--card);border-radius:16px;padding:18px 16px;text-align:center;}
  .flow-card .icon-circle{width:44px;height:44px;border-radius:12px;background:var(--lemon-grad);color:var(--ink);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;}
  .flow-card .icon-circle svg{width:20px;height:20px;}
  .flow-card h4{font-size:13.5px;margin-bottom:6px;}
  .flow-card p{font-size:11.5px;color:var(--muted);line-height:1.4;}
  .flow-arrow{display:flex;align-items:center;justify-content:center;color:var(--line);flex:0 0 24px;}
  @media(max-width:700px){.flow-arrow{display:none;}}

  .calc-box{background:var(--ink);border-radius:20px;padding:26px 24px;color:#fff;margin-top:8px;overflow:hidden;}
  [data-theme="dark"] .calc-box{background:var(--card);border:1px solid var(--line);}
  .calc-box h3{color:inherit;font-size:17px;margin-bottom:4px;}
  .calc-box .sub{font-size:12.5px;color:#B8BCC2;margin-bottom:18px;}
  .calc-row{margin-bottom:16px;}
  .calc-row-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:10px;}
  .calc-row label{font-size:12.5px;color:#B8BCC2;flex-shrink:0;}
  .calc-row input[type=range]{width:100%;accent-color:var(--lemon-b);}
  .calc-amount{font-family:'Sora',sans-serif;font-size:clamp(15px,4.5vw,24px);font-weight:800;text-align:right;word-break:break-word;min-width:0;}
  .calc-split{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}
  .calc-split .seg{flex:1;min-width:96px;background:rgba(255,255,255,0.08);border-radius:13px;padding:14px 10px;overflow:hidden;}
  .calc-split .seg .lbl{font-size:11px;color:#B8BCC2;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .calc-split .seg .num{font-family:'Sora',sans-serif;font-size:clamp(13px,3.6vw,18px);font-weight:800;word-break:break-word;}

  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);padding:13px 22px;border-radius:14px;font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:10px;box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:all .3s ease;z-index:80;max-width:90vw;}
  [data-theme="dark"] .toast{background:var(--lemon-grad);color:var(--ink);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  footer.note{text-align:center;padding:18px;font-size:11.5px;color:var(--muted);}
  .lightbox{position:fixed;inset:0;background:rgba(6,7,8,0.97);z-index:90;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .25s ease;}
  .lightbox.open{opacity:1;pointer-events:auto;}
  .lightbox-close{position:absolute;top:16px;right:16px;z-index:2;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.12);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;}
  .lightbox-track{flex:1;display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
  .lightbox-track::-webkit-scrollbar{display:none;}
  .lightbox-slide{flex:0 0 100%;scroll-snap-align:center;display:flex;align-items:center;justify-content:center;padding:0 16px;}
  .lightbox-slide img{max-width:100%;max-height:82vh;object-fit:contain;border-radius:10px;}
  .lightbox-dots{display:flex;justify-content:center;gap:7px;padding:16px;}
  .lightbox-dots .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.3);transition:background .2s ease;}
  .lightbox-dots .dot.active{background:var(--lemon-b);}

  /* Progress bar */
  .progress-wrap{margin:18px 0 8px;}
  .progress-track{display:flex;align-items:center;}
  .progress-step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;}
  .progress-dot{width:30px;height:30px;border-radius:50%;background:var(--card);border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--muted);z-index:2;transition:all .4s ease;}
  .progress-step.done .progress-dot{background:var(--lemon-grad);border-color:transparent;color:var(--ink);}
  .progress-step.active .progress-dot{border-color:var(--lemon-b);color:var(--ink);animation:pulse 1.6s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(191,224,26,.5);}70%{box-shadow:0 0 0 8px rgba(191,224,26,0);}100%{box-shadow:0 0 0 0 rgba(191,224,26,0);}}
  .progress-line{position:absolute;top:15px;left:-50%;width:100%;height:2px;background:var(--line);z-index:1;}
  .progress-step.done .progress-line{background:var(--lemon-b);}
  .progress-step:first-child .progress-line{display:none;}
  .progress-label{font-size:11px;font-weight:700;margin-top:8px;text-align:center;color:var(--muted);}
  .progress-step.done .progress-label, .progress-step.active .progress-label{color:var(--ink);}

  .rental-card{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px;}
  .rental-card h3{font-size:15px;margin-bottom:2px;}
  .rental-card .sub{font-size:12px;color:var(--muted);margin-bottom:6px;}
  .rental-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
  .dispute-link{font-size:12px;color:var(--danger);text-decoration:underline;font-weight:700;}

  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:20px;}
  .stat-card{background:var(--glass-bg);backdrop-filter:blur(14px) saturate(150%);-webkit-backdrop-filter:blur(14px) saturate(150%);border:1px solid var(--glass-border);border-radius:14px;padding:16px;}
  .stat-card .lbl{font-size:11.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
  .stat-card .val{font-family:'Sora',sans-serif;font-size:22px;font-weight:800;}

  .ref-box{background:var(--ink);color:#fff;border-radius:16px;padding:20px;margin-bottom:20px;}
  [data-theme="dark"] .ref-box{background:var(--card);border:1px solid var(--line);color:var(--ink);}
  .ref-box .lbl{font-size:12px;color:#B8BCC2;margin-bottom:10px;}
  [data-theme="dark"] .ref-box .lbl{color:var(--muted);}
  .ref-link-row{display:flex;gap:8px;align-items:center;background:rgba(255,255,255,0.08);border-radius:11px;padding:11px 13px;}
  [data-theme="dark"] .ref-link-row{background:var(--bg);}

let notifications = [];

async function fetchNotifications(){
  if(!session){ notifications = []; unreadCount = 0; return; }
  const { data, error } = await sb.from('notifications').select('*').eq('user_id', session.user.id).order('created_at',{ascending:false}).limit(30);
  if(error){ console.error(error); notifications = []; unreadCount = 0; return; }
  notifications = data;
  unreadCount = data.filter(n=>!n.is_read).length;
}
async function notifyUser(recipientId, type, message, listingId){
  if(!recipientId) return;
  try{
    await sb.from('notifications').insert({ user_id: recipientId, type, message, listing_id: listingId || null });
  }catch(err){ console.error('notification failed', err); }
}

function timeAgo(dateStr){
  const diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
  if(diff < 60) return 'just now';
  if(diff < 3600) return Math.floor(diff/60) + 'm ago';
  if(diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

/* ============ Auth ============ */
function passwordChecks(pw){
  pw = pw || '';
  return {
    len: pw.length >= 8,
    upper: /[A-Z]/.test(pw),
    lower: /[a-z]/.test(pw),
    num: /[0-9]/.test(pw),
    special: /[^A-Za-z0-9]/.test(pw),
  };
}
function updatePasswordStrength(pw, prefix){
  prefix = prefix || 'pw';
  const checks = passwordChecks(pw);
  Object.entries(checks).forEach(([key, met])=>{
    const row = document.querySelector(`.pw-req[data-req="${key}"]`);
    if(row) row.classList.toggle('met', met);
  });
  const metCount = Object.values(checks).filter(Boolean).length;
  const fill = document.getElementById(prefix + 'Fill');
  const label = document.getElementById(prefix + 'Label');
  if(!fill || !label) return;
  const pct = (metCount/5)*100;
  fill.style.width = pct + '%';
  if(metCount <= 2){ fill.style.background = 'var(--danger)'; label.textContent = 'Weak password'; }
  else if(metCount <= 4){ fill.style.background = '#E0A733'; label.textContent = 'Medium strength'; }
  else { fill.style.background = 'var(--lemon-b)'; label.textContent = 'Strong password'; }
}

function wireAuthSheet(){
  document.getElementById('closeSheet').addEventListener('click', closeDetail);
  document.querySelectorAll('.auth-tabs button').forEach(b=>b.addEventListener('click', ()=>openAuth(b.dataset.m)));
  const toForgot = document.getElementById('toForgot');
  if(toForgot) toForgot.addEventListener('click', ()=>openAuth('forgot'));
  const backToLogin = document.getElementById('backToLogin');
  if(backToLogin) backToLogin.addEventListener('click', ()=>openAuth('login'));

  const pwInput = document.getElementById('passwordInput');
  const togglePw = document.getElementById('togglePw');
  if(togglePw) togglePw.addEventListener('click', ()=>{
    const isHidden = pwInput.type === 'password';
    pwInput.type = isHidden ? 'text' : 'password';
    togglePw.innerHTML = iconSvg(isHidden ? 'eyeOff' : 'eye');
  });
  if(pwInput && document.getElementById('pwChecklist')){
    pwInput.addEventListener('input', ()=>updatePasswordStrength(pwInput.value));
  }
  const viewTermsBtn = document.getElementById('viewTermsBtn');
  if(viewTermsBtn) viewTermsBtn.addEventListener('click', showTermsSheet);

  document.getElementById('authForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const msgEl = document.getElementById('authMsg');
    const submitBtn = document.getElementById('authSubmit');
    msgEl.innerHTML = '';
    if(authMode==='signup'){
      const checks = passwordChecks(fd.get('password'));
      if(!Object.values(checks).every(Boolean)){
        msgEl.innerHTML = `<div class="auth-error">Your password doesn't meet all the requirements yet.</div>`;
        return;
      }
      if(!fd.get('acceptTerms')){
        msgEl.innerHTML = `<div class="auth-error">Please agree to the Terms &amp; Conditions to create an account.</div>`;
        return;
      }
    }
    submitBtn.disabled = true;
    try{
      if(authMode==='signup'){
        const { error } = await sb.auth.signUp({
          email: fd.get('email'), password: fd.get('password'),
          options:{ data:{ full_name: fd.get('fullName'), phone: fd.get('phone'), is_affiliate: !!fd.get('isAffiliate') },
                    emailRedirectTo: window.location.origin + window.location.pathname }
        });
        if(error) throw error;
        showWelcomeScreen(fd.get('fullName'), fd.get('email'));
        e.target.reset();
      } else if(authMode==='login'){
        const { error } = await sb.auth.signInWithPassword({ email: fd.get('email'), password: fd.get('password') });
        if(error){
          if(/email not confirmed/i.test(error.message)){
            msgEl.innerHTML = `<div class="auth-error">Please verify your email first. <button type="button" id="resendBtn" class="btn-text" style="color:var(--danger)">Resend verification link</button></div>`;
            submitBtn.disabled = false;
            const resendBtn = document.getElementById('resendBtn');
            if(resendBtn) resendBtn.addEventListener('click', async ()=>{
              await sb.auth.resend({ type:'signup', email: fd.get('email') });
              showToast('Verification link resent.');
            });
            return;
          }
          throw error;
        }
        closeDetail();
        await refreshSession();
        renderAccountButton();
        await fetchNotifications();
        renderNotifBtn();
        const firstName = (profile && profile.full_name || '').trim().split(' ')[0];
        showToast(firstName ? `Welcome back, ${firstName}!` : 'Welcome back!');
        view='browse'; renderAll();
        if(profile && !profile.is_affiliate){
          setTimeout(showAffiliatePromo, 550);
        }
      } else if(authMode==='forgot'){
        const { error } = await sb.auth.resetPasswordForEmail(fd.get('email'), { redirectTo: window.location.origin + window.location.pathname });
        if(error) throw error;
        msgEl.innerHTML = `<div class="auth-success">Reset link sent — check your email.</div>`;
      }
    }catch(err){
      msgEl.innerHTML = `<div class="auth-error">${esc(err.message || 'Something went wrong. Try again.')}</div>`;
    }
    submitBtn.disabled = false;
  });
}

/* ============ Data: listings ============ */
function isBoosted(l){ return !!(l.boosted_until && new Date(l.boosted_until) > new Date()); }
let likesMap = {}; // { [listingId]: { count, likedByMe } }
async function fetchLikesForListings(listingIds){
  likesMap = {};
  if(!listingIds.length) return;
  const { data, error } = await sb.from('likes').select('listing_id, user_id').in('listing_id', listingIds);
  if(error){ console.error(error); return; }
  data.forEach(row=>{
    if(!likesMap[row.listing_id]) likesMap[row.listing_id] = { count:0, likedByMe:false };
    likesMap[row.listing_id].count++;
    if(session && row.user_id === session.user.id) likesMap[row.listing_id].likedByMe = true;
  });
}
async function toggleLike(listing){
  if(!session){ openAuth('login'); showToast('Log in to like a listing.'); return; }
  const current = likesMap[listing.id] || { count:0, likedByMe:false };
  try{
    if(current.likedByMe){
      await sb.from('likes').delete().eq('listing_id', listing.id).eq('user_id', session.user.id);
      likesMap[listing.id] = { count: Math.max(0, current.count - 1), likedByMe:false };
    } else {
      await sb.from('likes').insert({ listing_id: listing.id, user_id: session.user.id });
      likesMap[listing.id] = { count: current.count + 1, likedByMe:true };
      if(listing.lister_id && listing.lister_id !== session.user.id){
        await notifyUser(listing.lister_id, 'like', `Your listing "${listing.title}" was just liked by a student.`, listing.id);
      }
    }
    renderBrowse();
  }catch(err){ showToast('Could not update like: ' + (err.message||'try again')); }
}
async function fetchListings(){
  const { data, error } = await sb.from('listings').select('*').eq('status','available').order('created_at',{ascending:false});
  if(error){ console.error(error); listings = []; return; }
  data.sort((a,b)=>{
    const aB = isBoosted(a), bB = isBoosted(b);
    if(aB !== bB) return aB ? -1 : 1;
    return new Date(b.created_at) - new Date(a.created_at);
  });
  listings = data;
  await fetchLikesForListings(listings.map(l=>l.id));
}

const BOOST_PRICE_PER_DAY = 650;
async function startBoostPayment(listing, days){
  if(typeof PaystackPop === 'undefined'){ showToast('Payment service failed to load. Check your connection.'); return; }
  const amount = BOOST_PRICE_PER_DAY * days;
  const handler = PaystackPop.setup({
    key: PAYSTACK_PUBLIC_KEY,
    email: session.user.email,
    amount: Math.round(amount * 100),
    currency: 'NGN',
    ref: 'rlboost_' + Date.now() + '_' + Math.floor(Math.random()*1e6),
    callback: function(response){ handleBoostSuccess(listing, days, response.reference); },
    onClose: function(){ showToast('Boost payment cancelled.'); }
  });
  handler.openIframe();
}
async function handleBoostSuccess(listing, days, ref){
  try{
    const now = new Date();
    const currentEnd = listing.boosted_until && new Date(listing.boosted_until) > now ? new Date(listing.boosted_until) : now;
    const newEnd = new Date(currentEnd.getTime() + days * 24 * 60 * 60 * 1000);
    await sb.from('listings').update({ boosted_until: newEnd.toISOString() }).eq('id', listing.id);
    showToast(`Boosted! This listing will stay on the first page until ${newEnd.toLocaleDateString('en-NG', {day:'numeric', month:'short'})}.`);
    await notifyUser(session.user.id, 'boost', `Your ad for "${listing.title}" is now live and will stay on the first page until ${newEnd.toLocaleDateString('en-NG',{day:'numeric',month:'short'})}.`, listing.id);
    await fetchMyListings();
    await fetchListings();
    await fetchNotifications();
    renderNotifBtn();
    renderAll();
  }catch(err){
    showToast('Payment succeeded but boost failed to save: ' + (err.message||'contact support'));
  }
}

async function uploadListingPhotos(files){
  if(!files || !files.length) return [];
  const urls = [];
  for(const file of files){
    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    const path = `${session.user.id}/${Date.now()}_${Math.floor(Math.random()*1e6)}_${safeName}`;
    const { error } = await sb.storage.from('listing-photos').upload(path, file);
    if(error){ console.error('photo upload failed', error); continue; }
    const { data } = sb.storage.from('listing-photos').getPublicUrl(path);
    if(data && data.publicUrl) urls.push(data.publicUrl);
  }
  return urls;
}

    .eq('renter_id', session.user.id)

  if(error){ console.error(error); myTransactions = []; return; }
  myTransactions = data;
}
async function fetchAffiliateStats(){
  if(!session || !profile || !profile.is_affiliate){ affiliateStats = null; return; }
  const { data, error } = await sb.from('transactions').select('*').eq('affiliate_id', session.user.id);
  if(error){ console.error(error); affiliateStats = { count:0, pending:0, confirmed:0 }; return; }
  const confirmed = data.filter(t=>t.status==='confirmed');
  affiliateStats = {
    count: data.length,
    pendingEarnings: confirmed.reduce((s,t)=>s + Number(t.affiliate_payout||0), 0),
    confirmedCount: confirmed.length,
  };
}

const LANDLORD_PCT_BASE = 0.90;
const ROOMLINK_PCT = 0.10;
const AFFILIATE_PCT = 0.05;
function computeSplit(rent, hasAffiliate){
  const company = Math.round(rent * ROOMLINK_PCT);
  const affiliate = hasAffiliate ? Math.round(rent * AFFILIATE_PCT) : 0;
  const landlord = rent - company - affiliate;
  return { landlord, affiliate, company };
}

function renderCommentTree(data){
  const topLevel = data.filter(c=>!c.parent_id);
  const repliesByParent = {};
  data.filter(c=>c.parent_id).forEach(c=>{ (repliesByParent[c.parent_id] = repliesByParent[c.parent_id]||[]).push(c); });
  return topLevel.map(c=>{
    const replies = repliesByParent[c.id] || [];
    return commentRowHtml(c,false) + (replies.length ? `<div class="comment-thread">${replies.map(r=>commentRowHtml(r,true)).join('')}</div>` : '');
  }).join('');
}

function openLightbox(photos, startIndex){
  if(!photos || !photos.length) return;
  const lightbox = document.getElementById('lightbox');
  const track = document.getElementById('lightboxTrack');
  const dots = document.getElementById('lightboxDots');
  track.innerHTML = photos.map(url=>`<div class="lightbox-slide"><img src="${esc(url)}" /></div>`).join('');
  dots.innerHTML = photos.length > 1 ? photos.map((_,i)=>`<span class="dot ${i===startIndex?'active':''}"></span>`).join('') : '';
  lightbox.classList.add('open');
  // Jump to the tapped photo without an animated scroll
  requestAnimationFrame(()=>{ track.scrollLeft = startIndex * track.clientWidth; });
  const dotEls = dots.querySelectorAll('.dot');
  let scrollTimer;
  track.onscroll = ()=>{
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(()=>{
      const idx = Math.round(track.scrollLeft / track.clientWidth);
      dotEls.forEach((d,i)=>d.classList.toggle('active', i===idx));
    }, 80);
  };
}

  const handler = PaystackPop.setup({
    key: PAYSTACK_PUBLIC_KEY,
    email: session.user.email,
    amount: Math.round(listing.price * 100), // kobo
    currency: 'NGN',
    ref: 'rl_' + Date.now() + '_' + Math.floor(Math.random()*1e6),
    callback: function(response){
      handleRentSuccess(listing, response.reference);
    },
    onClose: function(){
      showToast('Payment cancelled.');
    }
  });
  handler.openIframe();
}
async function handleRentSuccess(listing, ref){
  // Note: for a production app, verify this reference server-side via Paystack's
  // verify-transaction endpoint before trusting it. This prototype trusts the
  // client-side callback, which is fine for a course demo but not for real money.
  try{
    const refCode = localStorage.getItem('rl_ref_code');
    let affiliateId = null;
    if(refCode){
      const { data: aff } = await sb.from('profiles').select('id').eq('affiliate_code', refCode).maybeSingle();
      // Block self-referral: not the renter themselves, and not the person who listed this room.
      if(aff && aff.id !== session.user.id && aff.id !== listing.lister_id) affiliateId = aff.id;
    }
    const { landlord, affiliate, company } = computeSplit(listing.price, !!affiliateId);
    await sb.from('transactions').insert({
      listing_id: listing.id, renter_id: session.user.id, affiliate_id: affiliateId,
      amount: listing.price, landlord_payout: landlord, affiliate_payout: affiliate, company_payout: company,
      status: 'paid', paystack_ref: ref,
    });
    // Atomically take one room off the count — only flips the listing to
    // 'rented' (and hides it from Browse) once the last room is gone.
    const { data: remaining, error: decErr } = await sb.rpc('decrement_room', { listing_id_input: listing.id });
    if(decErr) console.error('room decrement failed', decErr);
    await fetchListings();
    closeDetail();
    if(remaining == null){
      // Extremely rare: someone else took the last room in the seconds between
      // this payment starting and finishing. Payment still succeeded and the
      // transaction is recorded — this needs a manual look/refund from you.
      showToast('Rent paid, but this room was just filled by someone else — we\'ll follow up with you directly.');
      view = 'dashboard'; renderAll();
    } else {
      showRentPaidPopup(listing, remaining);
    }
  }catch(err){
    showToast('Payment succeeded but saving failed: ' + (err.message||'contact support'));
  }
}

/* ============ Dashboard (renter) ============ */
function progressBarHtml(status){
  const steps = [
    {key:'paid', label:'Rent Paid'},
    {key:'movein', label:'Move In'},
    {key:'confirmed', label:'Confirmed'},
  ];
  let activeIdx = 0;
  if(status==='paid') activeIdx = 1; // step 1 done, step 2 (move in) active
  if(status==='confirmed') activeIdx = 3; // all done
  if(status==='disputed') activeIdx = 1;
  return `
    <div class="progress-wrap"><div class="progress-track">
      ${steps.map((s,i)=>{
        const done = i < activeIdx;
        const active = i === activeIdx;
        return `<div class="progress-step ${done?'done':''} ${active?'active':''}">
          <div class="progress-line"></div>
          <div class="progress-dot">${done?iconSvg('check','width="14" height="14"'):i+1}</div>
          <div class="progress-label">${s.label}</div>
        </div>`;
      }).join('')}
    </div></div>
  `;
}

async function fetchLandlordOwedSummary(listingIds){
  if(!listingIds.length) return {};
  const { data, error } = await sb.from('transactions').select('listing_id, landlord_payout').in('listing_id', listingIds).eq('status','confirmed');
  if(error){ console.error(error); return {}; }
  const map = {};
  data.forEach(t=>{ map[t.listing_id] = (map[t.listing_id] || 0) + Number(t.landlord_payout || 0); });
  return map;
}

async function confirmMoveIn(transactionId){
